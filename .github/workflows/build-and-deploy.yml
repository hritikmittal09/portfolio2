name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build --target build -t portfolio-build .

      - name: Run Docker to compile Tailwind CSS
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            portfolio-build \
            npx tailwindcss -i ./style2.css -o ./output.css --minify

      - name: Verify build output
        run: |
          if [ ! -f output.css ]; then
            echo "❌ Docker build failed - output.css missing"
            exit 1
          fi
          echo "✅ Docker build succeeded"

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    needs: build          # ← only runs if build job succeeds
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4