name: Build Check (Docker + npm)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run build check
        run: npm run build:check
        # ✅ docker build succeeds = npm build passed
        # ❌ docker build fails    = npm build failed = CI blocked